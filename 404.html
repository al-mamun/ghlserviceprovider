<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — GHL Service Provider</title>
  <meta name="robots" content="noindex, follow"/>
  <link rel="canonical" href="https://ghlserviceprovider.com/"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <style>
    .error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
    .error-code{font-family:var(--font-display);font-size:8rem;font-weight:900;background:var(--grad-accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:1rem;}
    .error-title{font-size:1.75rem;font-weight:700;margin-bottom:1rem;}
    .error-desc{color:var(--clr-text-2);margin-bottom:2rem;font-size:1.0625rem;}
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
      <a href="/" class="btn btn--primary">← Back to Home</a>
    </div>
  </div>
</body>
</html>
