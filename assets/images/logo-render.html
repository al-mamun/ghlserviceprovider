<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  /* ── DARK VERSION ── */
  body { background: #060812; display:flex; flex-direction:column; gap:60px; padding:60px; width:fit-content; }

  .logo { display:flex; align-items:center; gap:18px; }

  .logo-mark {
    width:90px; height:90px; border-radius:20px; flex-shrink:0;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 55%, #06b6d4 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 0 1.5px rgba(255,255,255,0.15) inset,
                0 2px 0 rgba(255,255,255,0.25) inset;
    position:relative; overflow:hidden;
  }
  .logo-mark::after {
    content:''; position:absolute; top:0; left:0; right:0; height:6px;
    background: rgba(255,255,255,0.22); border-radius:20px 20px 0 0;
  }
  .logo-mark span {
    font-family:'Space Grotesk', sans-serif;
    font-weight:800; font-size:50px; color:#fff; line-height:1;
    position:relative; z-index:1;
  }

  .logo-wordmark { display:flex; flex-direction:column; gap:2px; line-height:1; }

  .logo-primary {
    font-family:'Space Grotesk', sans-serif;
    font-weight:800; font-size:52px; color:#f1f5f9;
    letter-spacing:-0.5px;
  }
  .logo-primary em {
    font-style:normal;
    background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .logo-secondary {
    font-family:'Space Grotesk', sans-serif;
    font-weight:500; font-size:15px;
    letter-spacing:0.22em; text-transform:uppercase; color:#64748b;
    padding-left:2px;
  }

  /* ── LIGHT VERSION ── */
  .logo--light { background:#fff; padding:40px 50px; border-radius:16px; }
  .logo--light .logo-primary { color:#0f1428; }

  /* ── TRANSPARENT VERSION ── */
  .logo--transparent { background:transparent; }
  .logo--transparent .logo-primary { color:#0f1428; }
</style>
</head>
<body>

  <!-- DARK -->
  <div class="logo" id="dark">
    <div class="logo-mark"><span>G</span></div>
    <div class="logo-wordmark">
      <div class="logo-primary">GHL <em>Service</em></div>
      <div class="logo-secondary">Provider</div>
    </div>
  </div>

  <!-- LIGHT -->
  <div class="logo logo--light" id="light">
    <div class="logo-mark"><span>G</span></div>
    <div class="logo-wordmark">
      <div class="logo-primary">GHL <em>Service</em></div>
      <div class="logo-secondary">Provider</div>
    </div>
  </div>

</body>
</html>
